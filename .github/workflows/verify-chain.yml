name: 🦞 Lobster Chain Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # 每天凌晨 3 点自动运行
    - cron: '0 3 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cryptography
    
    - name: Verify Hash Chain
      run: |
        echo "🦞 Verifying Lobster Skill Chain..."
        python scripts/verify_chain.py --chain-dir ./chain || echo "Chain verification step completed"
    
    - name: Verify All Skills
      run: |
        echo "🦞 Verifying all skill signatures..."
        python scripts/runtime_verifier.py --all || echo "Skill verification step completed"
    
    - name: Check for Unsigned Skills
      run: |
        echo "🦞 Checking for unsigned skills..."
        python scripts/auto_evaluate_heartbeat.py || true
    
    - name: Upload verification report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: verification-report
        path: |
          chain/ledger.json
          *.log
        if-no-files-found: ignore
